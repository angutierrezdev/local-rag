services:
  # ChromaDB vector database
  # Client connects using tenant and database configured via .env (e.g., CHROMA_TENANT, CHROMA_DATABASE)
  chroma:
    image: chromadb/chroma:0.5.23
    container_name: chroma-db
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data
    networks:
      - default
      - dactil-network
    environment:
      - ALLOW_RESET=true
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
      - CHROMA_SERVER_HOST=${CHROMA_SERVER_HOST:-0.0.0.0}
      - CHROMA_SERVER_HTTP_PORT=${CHROMA_SERVER_HTTP_PORT:-8000}
      # Note: CHROMA_TENANT and CHROMA_DATABASE are client-side configs in .env
      # The server creates tenants/databases dynamically via API calls
    healthcheck:
      test: ["CMD", "curl", "-f", "${CHROMA_HEALTHCHECK_URL}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Folder watcher service - monitors the API drive folder and auto-ingests new files
  watcher:
    build:
      context: .
      dockerfile: Dockerfile.watcher
    container_name: rag-watcher
    volumes:
      - ${API_DRIVE_PATH}:/watched
    networks:
      - default
      - dactil-network
    environment:
      - WATCH_POLLING=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-mxbai-embed-large}
      - CHROMA_URL=http://chroma-db:8000
      - CHROMA_TENANT=${CHROMA_TENANT:-default_tenant}
      - CHROMA_DATABASE=${CHROMA_DATABASE:-default_database}
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma-data:

networks:
  dactil-network:
    external: true
